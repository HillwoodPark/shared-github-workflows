name: Dependabot Auto-merge

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version for build'
        type: string
        default: '24.x'
      allowed-licenses:
        description: 'Comma-separated list of allowed licenses'
        type: string
        default: 'Apache-2.0, MIT'
      fail-on-severity:
        description: 'Minimum vulnerability severity to block'
        type: string
        default: 'moderate'
      allow-dependencies-licenses:
        description: 'Packages exempt from license checks (purl format, comma-separated)'
        type: string
        default: ''
      npm-registry-url:
        description: 'Private npm registry URL (leave empty for default public registry)'
        type: string
        default: ''
      gcp-project-id:
        description: 'GCP project ID for Workload Identity Federation (leave empty to skip GCP auth)'
        type: string
        default: ''
      gcp-service-account:
        description: 'GCP service account for Workload Identity Federation'
        type: string
        default: ''
      gcp-workload-identity-provider:
        description: 'GCP Workload Identity Provider resource name'
        type: string
        default: ''
    secrets:
      NPM_TOKEN:
        description: 'Token for private npm registry (required when npm-registry-url is set)'
        required: false
      ANTHROPIC_API_KEY:
        description: 'Anthropic API key for Claude compatibility review'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        node-version: ['${{ inputs.node-version }}']
    steps:
    - name: Validate inputs
      run: |
        if [[ -n "$GCP_PROJECT_ID" ]]; then
          if [[ -z "$GCP_SERVICE_ACCOUNT" || -z "$GCP_WIF_PROVIDER" ]]; then
            echo "::error::gcp-project-id is set but gcp-service-account or gcp-workload-identity-provider is missing"
            exit 1
          fi
        fi
        if [[ -n "$NPM_REGISTRY_URL" ]]; then
          if [[ -z "$NPM_TOKEN" ]]; then
            echo "::warning::npm-registry-url is set but NPM_TOKEN secret appears empty — npm ci will likely fail"
          fi
        fi
      env:
        GCP_PROJECT_ID: ${{ inputs.gcp-project-id }}
        GCP_SERVICE_ACCOUNT: ${{ inputs.gcp-service-account }}
        GCP_WIF_PROVIDER: ${{ inputs.gcp-workload-identity-provider }}
        NPM_REGISTRY_URL: ${{ inputs.npm-registry-url }}
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    - uses: actions/checkout@v6
    - name: Google Auth
      if: inputs.gcp-project-id != ''
      uses: google-github-actions/auth@v3
      with:
        project_id: ${{ inputs.gcp-project-id }}
        service_account: ${{ inputs.gcp-service-account }}
        workload_identity_provider: ${{ inputs.gcp-workload-identity-provider }}
    - name: Dependency Review
      if: ${{ !github.event.repository.private }}
      uses: actions/dependency-review-action@v4
      with:
        fail-on-severity: ${{ inputs.fail-on-severity }}
        allow-licenses: ${{ inputs.allowed-licenses }}
        allow-dependencies-licenses: ${{ inputs.allow-dependencies-licenses }}
    - name: Use Node.js ${{ matrix.node-version }} (private registry)
      if: inputs.npm-registry-url != ''
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        registry-url: ${{ inputs.npm-registry-url }}
    - name: Use Node.js ${{ matrix.node-version }}
      if: inputs.npm-registry-url == ''
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci --ignore-scripts
    - run: npm run build --if-present
    - run: npm test

  dependabot:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    env:
      PR_URL: ${{ github.event.pull_request.html_url }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          compat-lookup: true
      - name: Log decision inputs
        run: |
          echo "### Dependabot Decision Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Signal | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Package | $DEP_NAMES |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Update type | $UPDATE_TYPE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dependency type | $DEP_TYPE |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Compatibility score | ${COMPAT_SCORE}% |" >> "$GITHUB_STEP_SUMMARY"
        env:
          DEP_NAMES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.dependabot-metadata.outputs.dependency-type }}
          COMPAT_SCORE: ${{ steps.dependabot-metadata.outputs.compatibility-score }}
      - name: Auto merge low-risk PRs
        id: auto-merge
        if: >-
          ${{
            (
              steps.dependabot-metadata.outputs.update-type == 'version-update:semver-patch' ||
              steps.dependabot-metadata.outputs.update-type == 'version-update:semver-minor'
            ) && (
              steps.dependabot-metadata.outputs.compatibility-score == 0 ||
              steps.dependabot-metadata.outputs.compatibility-score >= 75
            )
          }}
        run: |
          gh pr merge --auto --merge \
            -b "Auto-merged ${DEP_NAMES} (${UPDATE_TYPE}, ${DEP_TYPE}, compat: ${COMPAT_SCORE}%)." \
            "$PR_URL"
        env:
          DEP_NAMES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.dependabot-metadata.outputs.dependency-type }}
          COMPAT_SCORE: ${{ steps.dependabot-metadata.outputs.compatibility-score }}
      - name: Comment on PRs requiring review
        id: manual-review
        if: >-
          ${{
            steps.dependabot-metadata.outputs.update-type == 'version-update:semver-major' ||
            (
              steps.dependabot-metadata.outputs.compatibility-score > 0 &&
              steps.dependabot-metadata.outputs.compatibility-score < 75
            )
          }}
        run: |
          gh pr review --comment \
            -b "⚠️ **Manual review required.**

          | Signal | Value |
          |--------|-------|
          | Package | ${DEP_NAMES} |
          | Update type | ${UPDATE_TYPE} |
          | Dependency type | ${DEP_TYPE} |
          | Compatibility score | ${COMPAT_SCORE}% |

          This PR was not auto-merged because it is either a major version update or has a low compatibility score (< 75%)." \
            "$PR_URL"
        env:
          DEP_NAMES: ${{ steps.dependabot-metadata.outputs.dependency-names }}
          UPDATE_TYPE: ${{ steps.dependabot-metadata.outputs.update-type }}
          DEP_TYPE: ${{ steps.dependabot-metadata.outputs.dependency-type }}
          COMPAT_SCORE: ${{ steps.dependabot-metadata.outputs.compatibility-score }}
      - name: Warn if no action was taken
        if: ${{ steps.auto-merge.outcome == 'skipped' && steps.manual-review.outcome == 'skipped' }}
        run: |
          echo "::warning::No auto-merge or review comment was triggered for this PR. Check the decision logic."
          echo "⚠️ **No action taken** — this PR didn't match auto-merge or manual-review criteria." >> "$GITHUB_STEP_SUMMARY"

  claude-review:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
      actions: read
      
    steps:
      - uses: actions/checkout@v6

      - name: Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          compat-lookup: true
      - name: Claude compatibility assessment
        id: analyze
        if: >-
          ${{
            steps.dependabot-metadata.outputs.update-type == 'version-update:semver-major' ||
            (
              steps.dependabot-metadata.outputs.compatibility-score > 0 &&
              steps.dependabot-metadata.outputs.compatibility-score < 75
            )
          }}
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "dependabot[bot]"
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            
            Assess this dependabot dependency update for compatibility risk.

            Package: ${{ steps.dependabot-metadata.outputs.dependency-names }}
            Update type: ${{ steps.dependabot-metadata.outputs.update-type }}
            Compatibility score: ${{ steps.dependabot-metadata.outputs.compatibility-score }}%

            Please:
            1. Find all imports and usages of this package in the codebase
            2. Check the package's changelog or release notes for breaking changes
            3. Assess whether our usage is affected by any breaking changes
            4. Provide a clear recommendation

            Format your response as:
            ## Compatibility Assessment
            **Recommendation:** PASS | FAIL | NEEDS REVIEW
            **Risk Level:** Low | Medium | High
            ### Usage in Codebase
            [list files that import or use this package]
            ### Breaking Changes Analysis
            [analysis of changelog/release notes]
            ### Recommendation Details
            [explain why you gave this recommendation]

            Add the response as a PR comment

            Return: recommendation (string), riskLevel (string)
          claude_args: |
            --allowedTools "Bash(gh pr comment:*)"
            --json-schema '{"type":"object","properties":{"recommendation":{"type":"string"},"riskLevel":{"type":"string"}},"required":["recommendation","riskLevel"]}'
      - name: Claude Code Compatibility Summary
        if: fromJSON(steps.analyze.outputs.structured_output).recommendation
        run: |
          echo "### Claude Code Compatibility Summary" >> "$GITHUB_STEP_SUMMARY"
          echo steps.analyze.outputs.structured_output >> "$GITHUB_STEP_SUMMARY"

