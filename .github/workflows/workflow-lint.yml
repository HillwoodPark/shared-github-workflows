# Guards the workflow supply chain. Runs on every PR to main; a REQUIRED status
# check (context: "workflow-lint"). Two enforced layers (both block on failure):
#   1. Ban `pull_request_target` — the trigger that exposes secrets to fork PRs
#      (classic Actions exfiltration vector). Deterministic grep.
#   2. zizmor static audit (template-injection, dangerous-triggers, artipacked,
#      cache-poisoning, ...), pinned to a fixed version. Accepted baseline
#      findings (auto-merge excessive-permissions) are ignored via .github/zizmor.yml.
name: Workflow Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Ban pull_request_target
        run: |
          if grep -rnE '^[[:space:]]*pull_request_target[[:space:]]*:' .github/workflows/; then
            echo "::error::pull_request_target is banned in this org (secret-exfiltration risk). Use pull_request."
            exit 1
          fi
      - name: Static audit (zizmor)
        env:
          GH_TOKEN: ${{ github.token }}
        run: pipx run zizmor==1.26.1 --persona=regular --min-severity=high .github/workflows/
